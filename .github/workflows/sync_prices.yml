name: Sonar Caju - Price Sync Robot (DESATIVADO)

# ⚠️ DESATIVADO em jul/2026. Este robô (scripts/sync_prices.py) é uma SIMULAÇÃO:
# gera preços aleatórios, não coleta nada real, e o cron diário estava poluindo o
# repositório com dados falsos (competitors.json) commitados como "Sonar Caju Bot".
# A coleta real agora é o coletor local Playwright (scripts/coletor/). Este workflow
# só roda por acionamento manual explícito; o gatilho agendado foi removido.
# TODO: remover de vez junto com o front v1 (competitors.json / dataService).

on:
  workflow_dispatch:

jobs:
  sync_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout do Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Instalar Dependências de Scrape & Análise
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 fake-useragent

      - name: 🧭 Executar Robô Sonar Coletor em Nuvem
        run: |
          python scripts/sync_prices.py

      - name: 💾 Commit & Push de Preços Atualizados (`competitors.json`)
        run: |
          git config --global user.name "Sonar Caju Bot 🤖"
          git config --global user.email "bot@sonarcaju.aracaju.br"
          git add data/competitors.json
          if git diff --staged --quiet; then
            echo "Nenhuma variação de preço detectada hoje."
          else
            git commit -m "🤖 Sonar Caju Auto-Sync: Atualização automática de tarifas e metas de mercado"
            git push
          fi
